name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  sqlite:
    name: SQLite / Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run sqlite:version
      - run: npm run build
      - run: npm run test:sqlite
      - run: npm run test:transformer

  postgres:
    name: PostgreSQL ${{ matrix.postgres }} / Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        postgres: [15, 16, 17]

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: typhex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TYPHEX_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/typhex_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test:postgres

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [sqlite, postgres]
    if: always()
    steps:
      - name: All matrix jobs passed
        run: |
          if [ "${{ needs.sqlite.result }}" != "success" ] || [ "${{ needs.postgres.result }}" != "success" ]; then
            echo "sqlite: ${{ needs.sqlite.result }}, postgres: ${{ needs.postgres.result }}"
            exit 1
          fi
