name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish npm package and GitHub release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Read package metadata
        id: package
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { readFileSync } = require("node:fs");
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const version = pkg.version;
          const isPrerelease = version.includes("-");
          const distTag = isPrerelease ? version.split("-")[1].split(".")[0] : "latest";

          console.log(`name=${pkg.name}`);
          console.log(`version=${version}`);
          console.log(`tag=v${version}`);
          console.log(`dist_tag=${distTag}`);
          console.log(`prerelease=${isPrerelease}`);
          NODE

      - name: Validate git tag matches package version
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ steps.package.outputs.tag }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${{ steps.package.outputs.version }}"
            exit 1
          fi

      - run: npm run release:check
      - run: npm run pack:check
      - run: npm install -g npm@11.5.1

      - name: Check whether npm version already exists
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.published == 'false'
        run: npm publish --tag "${{ steps.package.outputs.dist_tag }}" --provenance

      - name: Check whether GitHub release already exists
        id: github_release
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        if: steps.github_release.outputs.exists == 'false'
        run: |
          args=(release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes)
          if [ "${{ steps.package.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}
